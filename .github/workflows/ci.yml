name: ci

# The formal-driven gate. melissi's guarantee is that the shipped code
# refines the verified specs; CI enforces it on every push:
#   - the parity matrix re-checks `optimal-testbed/run.sh` row for row, with
#     distinct-state counts asserted EQUAL to TLC's (machine);
#   - the bee-exact vectors (bmt address, postage stamp, proximity, overlay)
#     must keep matching bee's own test vectors;
#   - fmt + clippy keep the showcase clean.
# Any drift in the refinement turns CI red.

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: format
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets --all-features

      - name: test (parity matrix + all crates)
        run: cargo test --all

      - name: test (composite storm row — 722k states, release)
        run: cargo test --all --release -- --ignored
